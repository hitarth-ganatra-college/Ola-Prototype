global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "trip-service"
    static_configs:
      - targets: ["host.docker.internal:4005"]

  - job_name: "tracking-service"
    metrics_path: /health
    static_configs:
      - targets: ["host.docker.internal:4003"]

  - job_name: "matching-service"
    metrics_path: /health
    static_configs:
      - targets: ["host.docker.internal:4004"]

  - job_name: "identity-service"
    metrics_path: /health
    static_configs:
      - targets: ["host.docker.internal:4001"]
